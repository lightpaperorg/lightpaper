name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app/ tests/
      - run: ruff format --check app/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lightpaper
          POSTGRES_PASSWORD: lightpaper_dev
          POSTGRES_DB: lightpaper
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U lightpaper"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - name: Initialize database
        run: PGPASSWORD=lightpaper_dev psql -h localhost -p 5433 -U lightpaper -d lightpaper -f init.sql
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://lightpaper:lightpaper_dev@localhost:5433/lightpaper
          BASE_URL: http://localhost:8001
          FIREBASE_PROJECT_ID: test-project
        run: python -m pytest tests/ -v

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t lightpaper-test .

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      - run: bandit -r app/ -ll -ii

  deploy:
    name: Deploy to Cloud Run
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, test, docker, security]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build container
        run: |
          gcloud builds submit \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --tag="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lightpaper/api" \
            --timeout=600

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy lightpaper \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --region=us-central1 \
            --image="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lightpaper/api" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --cpu=2 \
            --memory=2Gi \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=120 \
            --concurrency=100 \
            --add-cloudsql-instances="${{ secrets.GCP_PROJECT_ID }}:us-central1:lightpaper-db" \
            --set-env-vars="^||^FIREBASE_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}||BASE_URL=https://lightpaper.org||CORS_ORIGINS=https://lightpaper.org,http://localhost:3000" \
            --update-secrets="DATABASE_URL=lightpaper-db-url:latest"

      - name: Health check
        run: |
          sleep 10
          curl -sf https://lightpaper.org/health
